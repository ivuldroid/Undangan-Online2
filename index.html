<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#BC8887" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Undangan Pernikahan</title>
    <!-- Bulma Version 0.8.x-->
    <link rel="stylesheet" href="https://unpkg.com/bulma@0.8.0/css/bulma.min.css" />
    <link rel="stylesheet" type="text/css" href="css/menikah.css" />
    <link rel="stylesheet" type="text/css" href="css/jquery.countdown.css" />
    <script src="https://kit.fontawesome.com/2828f7885a.js" crossorigin="anonymous"></script>
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script src="js/jquery.coundown.js"></script>
  </head>

  <body>
    <!-- (Bagian Header & Hero dibiarkan sama seperti template asli Anda) -->
    <div class="header-wrapper" id="home">
      <section class="hero is-large">
        <div class="hero-body">
          <div class="container has-text-centered">
            <h1 class="subtitle">Undangan Pernikahan</h1>
            <h2 class="title">Nama Wanita & Nama Pria</h2>
          </div>
        </div>
      </section>
    </div>

    <div class="main-content">
      <!-- (Isi template utama di sini...) -->
      
      <!-- TAMBAHAN: Section Komentar -->
      <section class="section-light regular-section" id="ucapan">
        <div class="container">
          <h1 class="title has-text-centered section-title" data-aos="fade-up">Ucapan & Doa</h1>
          <form id="commentForm" class="box" style="max-width: 600px; margin: auto;" data-aos="fade-up">
            <div class="field">
              <label class="label">Nama</label>
              <input type="text" id="name" class="input" placeholder="Nama Anda" required>
            </div>
            <div class="field">
              <label class="label">Pesan</label>
              <textarea id="message" class="textarea" placeholder="Tulis doa restu..." required></textarea>
            </div>
            <button type="submit" class="button is-primary is-fullwidth">Kirim Ucapan</button>
          </form>
          <div id="commentList" class="mt-6" style="max-width: 600px; margin: auto;">
             <p class="has-text-centered">Memuat ucapan...</p>
          </div>
        </div>
      </section>

      <!-- Section RSVP (Asli dari template) -->
      <section class="section-dark contact" id="rsvp">
         <!-- (Isi RSVP Anda tetap di sini) -->
      </section>
    </div>

    <!-- FIREBASE SDK & LOGIC -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLK-Ys7RF2bLgZlzjQxEyQfpx2cCsiblQ",
            authDomain: "selovely-228b6.firebaseapp.com",
            databaseURL: "https://selovely-228b6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "selovely-228b6",
            storageBucket: "selovely-228b6.firebasestorage.app",
            messagingSenderId: "387647365822",
            appId: "1:387647365822:web:2845152e7c36149d96b4ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Fungsi Kirim
        document.getElementById('commentForm').onsubmit = (e) => {
            e.preventDefault();
            db.collection("ucapan").add({
                name: document.getElementById('name').value,
                message: document.getElementById('message').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                alert("Terima kasih atas doanya!");
                document.getElementById('commentForm').reset();
            });
        };

        // Fungsi Tampil
        db.collection("ucapan").orderBy("timestamp", "desc").onSnapshot(snap => {
            const list = document.getElementById('commentList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="box mb-3"><strong>${d.name}</strong><p>${d.message}</p></div>`;
            });
        });
    </script>

    <!-- Scripts Template Asli -->
    <script src="js/menikah.js"></script>
  </body>
</html>
